# Project Config
project_name: "EcoTracing"

# Paths
paths:
  drive_data: "/content/drive/MyDrive/EcoTracing"
  raw_data: "raw"
  processed_data: "data/processed"
  local_drive_data: "G:\\내 드라이브\\EcoTracing\\data"
  models: "models"
  outputs: "outputs"
  processed_file: "instance_usage_full_processed.parquet"

# Data
data:
  source: "google_cluster_trace"
  sample_size: 100000

# Model
model:
  type: "lightgbm"
  random_state: 42
  test_size: 0.2
  model_names:
    lightgbm: "energy_model_lightgbm.pkl"
    xgboost: "energy_model_xgboost.pkl"
    randomforest: "energy_model_randomforest.pkl"
    catboost: "energy_model_catboost.pkl"
    linearregression: "energy_model_linearregression.pkl"
    stacking_meta: "energy_model_stacking_meta.pkl"
    mlp: "energy_model_mlp.pt"
    scaler_x: "energy_scaler_x.pkl"
    scaler_y: "energy_scaler_y.pkl"
    rf_hourly: "energy_model_rf_hourly.pkl" 
    stacking_mlp_rf: "energy_model_stacking_mlp_rf.pkl"
    mlp_residual    : "energy_model_mlp_residual.pkl"
    scaler_x_residual: "scaler_x_residual.pkl"
  mlp_input_size: 3
  best_model: "residual_learning"
  features: ["cpu", "memory", "duration"]
  results:
    metrics_csv: "phase1_metrics.csv"
    results_json: "phase1_full_results.json"
    feature_importance_csv: "feature_importance_comparison.csv"
    results_json_mlp: "phase1_full_results_mlp.json"
    results_json_hourly: "phase1_results_hourly.json"
    results_json_stacking: "phase1_full_results_stacking.json"
    results_json_residual: "phase1_full_results_residual.json"

# Carbon
carbon:
  emission_factor: 0.5 # kg CO2 per kWh (조정 필요)